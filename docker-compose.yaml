services:
  db:
    image: mysql:latest
    container_name: mysql
    networks:
      - network
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    restart: always    
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crud_app
      MYSQL_USER: user
      MYSQL_PASSWORD: pass   
    healthcheck:
      test: ["CMD", "mysqladmin","ping","-h","localhost","-uuser","-ppass"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s    

  backend:  
    build:
      context: ./api
    container_name: backend_cont
    networks:
      - network
    ports:
      - "5000:5000"
    restart: unless-stopped
    depends_on:
       db:
         condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: user
      DB_PASSWORD: pass
      DB_NAME: crud_app
      JWT_SECRET: devopsShackSuperSecrettKey

  frontend: 
    build:
      context: ./client
    container_name: frontend_cont
    networks: 
       - network
    ports:
       - "80:80"
    restart: unless-stopped
    depends_on:
       - backend     

networks:
  network:

volumes:
  mysql-data:  
