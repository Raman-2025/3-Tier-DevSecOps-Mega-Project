name: ci
on: 
  push:
    branches: 
        - main

jobs:
  clone-build-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: show current dir
        run: pwd

      - name: setup QEMU
        uses: docker/setup-qemu-action@v4 
          
      - name: docker buildx
        uses: docker/setup-buildx-action@v4    

      - name: dockerhub login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: push frontend
        uses: docker/build-push-action@v7
        with: 
          context: ./client
          push: true
          tags: |
              ${{ secrets.DOCKERHUB_USER  }}/mega-frontend:latest 

      - name: push backend
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          tags: |
              ${{ secrets.DOCKERHUB_USER  }}/mega-backend:latest              
